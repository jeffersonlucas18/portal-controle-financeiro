<div class="modal-header">
  <h4 class="modal-title">Contas</h4>
  <button type="button" class="btn-close" aria-label="Close"></button>
</div>
<div class="modal-body">

  <form [formGroup]="form">
    <div class="row mb-2">
      <div class="col-lg-6">
        <label>Nome</label>
        <input class="form-control" formControlName="name" placeholder="Digite seu nome">
      </div>

      <div class="col-lg-6">
        <label>Salario</label>
        <input class="form-control" formControlName="salary" placeholder="Digite seu salário">
      </div>
    </div>

    <div class="row mb-2">
      <div class="col-lg-12">
        <label>Categoria</label>
        <select class="form-select" name="categorie" formControlName="categoryId">
          <option [value]="null">Selecione...</option>
          @for (categorie of categories(); track $index) {
          <option [value]="categorie.id">{{categorie.name}}</option>
          }
        </select>
      </div>
    </div>

    @if (this.form.value.categoryId == 2) {
    <div class="row mb-2">
      <div class="col-lg-4">
        <label>Qtde Parcela</label>
        <input class="form-control" formControlName="amountInstallment" placeholder="Digite sua quantidade de parcela"
          type="number">
      </div>

      <div class="col-lg-4">
        <label>Qtde Parcela Pagas</label>
        <input class="form-control" formControlName="amountInstallmentPay"
          placeholder="Digite sua quantidade de parcela pagas" type="number">
      </div>

      <div class="col-lg-4">
        <label>Valor das Parcela</label>
        <input class="form-control" formControlName="valueInstallment" placeholder="Digite o valor da sua parcela"
          type="number">
      </div>
    </div>

    }

  </form>

</div>
<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary">Sair</button>
</div>
