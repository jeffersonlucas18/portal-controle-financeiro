<div class="container-fluid">
  <div class="row">
    <div class="col-lg-12">
      <div class="d-flex justify-content-between">
        <h3>Despesas/<small><a href="javascript:void(0)" routerLink="/account/accounts">Voltar</a></small></h3>

        <div class="inline">
          @if (!loading$()){
          <button class="btn btn-primary" (click)="openModal(modal)">Novo</button>

          }
        </div>
      </div>

    </div>
  </div>


  <div class="row">
    <div class="col-lg-12">
      <div class="card">
        <div class="card-body">
          <div class="">
            <table class="table">
              <thead>
                <tr>
                  <th scope="col">Nome</th>
                  <th scope="col">Valor</th>
                </tr>
              </thead>
              @if (!loading$() && expenses().length) {
              <tbody>
                @for (account of expenses(); track account) {
                <tr>
                  <td>{{account.name}}</td>
                  <td>{{account.value |currency: 'BRL'}}</td>
                </tr>
                }

              </tbody>
              }
            </table>
          </div>

          @if (!expenses().length && !loading$()) {
          <div class="alert alert-info" role="alert">
            Nenhuma informação encontrada!
          </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #modal>
  <app-modal-expense (reload$)="reload()" [configId]="configId()" [modalBs]="modalBs" />
</ng-template>
